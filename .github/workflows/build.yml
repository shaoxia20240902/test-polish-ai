name: Build

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build
        run: xcodebuild -project TextPolish.xcodeproj -scheme TextPolish -configuration Release build

      - name: Create Archive
        run: |
          cd build/Release
          zip -r TextPolish.app.zip TextPolish.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextPolish-app
          path: build/Release/TextPolish.app.zip

      - name: Create Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: build/Release/TextPolish.app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
